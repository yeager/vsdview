name: Build RPM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: dnf install -y rpm-build python3 gettext findutils tar gzip

      - name: Get version
        id: version
        run: |
          VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Build RPM
        run: |
          PKG="vsdview"
          VER="${{ steps.version.outputs.version }}"

          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          tar czf ~/rpmbuild/SOURCES/${PKG}-${VER}.tar.gz \
            --transform "s,^,${PKG}-${VER}/," \
            $(ls -d src/vsdview vsdview po data pyproject.toml *.desktop *.metainfo.xml 2>/dev/null)

          cat > ~/rpmbuild/SPECS/${PKG}.spec << 'SPECEOF'
Name:           vsdview
Version:        VERSIONPLACEHOLDER
Release:        1%{?dist}
Summary:        Read-only viewer for Microsoft Visio files
License:        GPL-3.0-or-later
URL:            https://github.com/yeager/vsdview
Source0:        %{name}-%{version}.tar.gz
BuildArch:      noarch
Requires:       python3 >= 3.10
Requires:       python3-gobject
Requires:       gtk4
Requires:       libadwaita
Requires:       librsvg2
Recommends:     librsvg2-tools

%description
VSDView is a read-only viewer for Microsoft Visio files (.vsdx and .vsd).

%prep
%setup -q

%install
PYNAME="vsdview"
mkdir -p %{buildroot}/usr/lib/python3/dist-packages/$PYNAME
if [ -d "src/$PYNAME" ]; then
  cp -r src/$PYNAME/* %{buildroot}/usr/lib/python3/dist-packages/$PYNAME/
elif [ -d "$PYNAME" ]; then
  cp -r $PYNAME/* %{buildroot}/usr/lib/python3/dist-packages/$PYNAME/
fi

mkdir -p %{buildroot}/usr/bin
cat > %{buildroot}/usr/bin/%{name} << 'LAUNCHER'
#!/usr/bin/python3
import sys
from vsdview.__main__ import main
sys.exit(main())
LAUNCHER
chmod 755 %{buildroot}/usr/bin/%{name}

mkdir -p %{buildroot}/usr/share/applications
mkdir -p %{buildroot}/usr/share/metainfo
mkdir -p %{buildroot}/usr/share/icons/hicolor/scalable/apps
for f in data/*.desktop *.desktop; do
  [ -f "$f" ] && install -m 644 "$f" %{buildroot}/usr/share/applications/
done
for f in data/*.metainfo.xml *.metainfo.xml; do
  [ -f "$f" ] && install -m 644 "$f" %{buildroot}/usr/share/metainfo/
done
find data/icons -name "*.svg" -print0 2>/dev/null | xargs -0 -I{} install -m 644 {} %{buildroot}/usr/share/icons/hicolor/scalable/apps/ 2>/dev/null || true

for po in po/*.po; do
  [ -f "$po" ] || continue
  lang=$(basename "$po" .po)
  mkdir -p %{buildroot}/usr/share/locale/$lang/LC_MESSAGES
  msgfmt -o %{buildroot}/usr/share/locale/$lang/LC_MESSAGES/%{name}.mo "$po"
done

%files
/usr/bin/%{name}
/usr/lib/python3/dist-packages/vsdview/
/usr/share/applications/
/usr/share/metainfo/
/usr/share/icons/
/usr/share/locale/*/LC_MESSAGES/%{name}.mo
SPECEOF

          sed -i "s/VERSIONPLACEHOLDER/$VER/" ~/rpmbuild/SPECS/${PKG}.spec
          rpmbuild -bb ~/rpmbuild/SPECS/${PKG}.spec
          cp ~/rpmbuild/RPMS/noarch/*.rpm .

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: "*.rpm"

  upload-rpm:
    needs: build-rpm
    runs-on: ubuntu-latest
    steps:
      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: rpm-package

      - name: Get version from RPM filename
        id: version
        run: |
          RPM=$(ls *.rpm | head -1)
          echo "rpm=$RPM" >> $GITHUB_OUTPUT
          VER=$(echo "$RPM" | grep -oP '\d+\.\d+\.\d+')
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Upload RPM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.version.outputs.version }}"
          RPM="${{ steps.version.outputs.rpm }}"
          gh release upload "v${VER}" "$RPM" --repo ${{ github.repository }} --clobber 2>/dev/null || \
          gh release upload "${{ github.ref_name }}" "$RPM" --repo ${{ github.repository }} --clobber 2>/dev/null || true
